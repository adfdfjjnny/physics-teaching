<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>物理图标预览 — 选一个</title>
<style>
  body { font-family: "Microsoft YaHei", sans-serif; background: #f0f4f8; padding: 30px; text-align: center; }
  h1 { color: #1e3a5f; margin-bottom: 30px; }
  .options { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
  .card { background: white; border-radius: 16px; padding: 30px; width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); transition: transform 0.2s; cursor: pointer; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
  .card svg { width: 120px; height: 120px; }
  .card h3 { margin: 15px 0 8px; color: #1e293b; }
  .card p { font-size: 0.85rem; color: #64748b; }
  .selected { border: 3px solid #2563eb; }
  .header-preview { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); border-radius: 16px; padding: 24px; margin: 0 auto 40px; max-width: 800px; display: flex; align-items: center; justify-content: center; gap: 16px; color: white; }
  .header-preview h2 { font-size: 1.4rem; margin: 0; }
  .header-preview p { font-size: 0.85rem; opacity: 0.8; margin: 4px 0 0; }
  .header-preview .logo { height: 56px; width: auto; }
  .btn { margin-top: 30px; padding: 12px 30px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
</style>
</head>
<body>

var optionsEl = document.getElementById('options');
var previewLogo = document.getElementById('previewLogo');

function showPreview(svg) {
  previewLogo.innerHTML = '<div class="logo">' + svg + '</div>';
}

icons.forEach(function(icon, i) {
  var card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = icon.svg + '<h3>' + icon.name + '</h3><p>' + icon.desc + '</p>';
  card.onclick = function() {
    document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('selected'); });
    card.classList.add('selected');
    showPreview(icon.svg);
  };
  optionsEl.appendChild(card);
});

// 默认显示麦克斯韦动画
showPreview(icons[0].svg);
document.querySelectorAll('.card')[0].classList.add('selected');

</html>
