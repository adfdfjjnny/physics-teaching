<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欧姆定律 - 电路模拟</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    canvas { border: 2px solid #333; border-radius: 8px; margin: 20px 0; }
  </style>
</head>
<body>
  <h2>⚡ 欧姆定律 — 电路模拟</h2>
  <p>此处放置你的电路教学互动程序</p>
  <canvas id="canvas" width="700" height="400"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.font = '24px Microsoft YaHei';
    ctx.fillStyle = '#f59e0b';
    ctx.textAlign = 'center';
    ctx.fillText('请替换为此处你的电路教学程序', canvas.width/2, canvas.height/2);
  </script>
</body>
</html>
