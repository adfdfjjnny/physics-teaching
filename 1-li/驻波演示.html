<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>驻波演示 - 高中物理</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0d0d2b 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #e0e0e0;
  }
  .container {
    background: rgba(20, 20, 50, 0.85);
    border-radius: 20px;
    padding: 30px 35px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    max-width: 980px;
    width: 95%;
    backdrop-filter: blur(10px);
  }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #64b5f6, #ce93d8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-bottom: 18px;
  }
  canvas {
    display: block;
    width: 100%;
    border-radius: 12px;
    background: #0a0a1a;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.6);
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 20px;
    align-items: flex-end;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 180px;
  }
  .control-group label {
    font-size: 13px;
    color: #aaa;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .control-group label .val {
    font-weight: 700;
    font-size: 15px;
    color: #64b5f6;
    min-width: 60px;
    text-align: right;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: linear-gradient(90deg, #64b5f6, #ce93d8);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid #64b5f6;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(100,181,246,0.5);
    transition: box-shadow 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 20px rgba(100,181,246,0.8);
  }
  .btn-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  button {
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
  }
  .btn-play {
    background: linear-gradient(135deg, #43a047, #66bb6a);
    color: #fff;
    min-width: 90px;
  }
  .btn-play:hover { box-shadow: 0 4px 20px rgba(67,160,71,0.5); transform: translateY(-1px); }
  .btn-play.paused {
    background: linear-gradient(135deg, #e65100, #ff9800);
  }
  .btn-reset {
    background: rgba(255,255,255,0.08);
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn-reset:hover { background: rgba(255,255,255,0.15); }
  .info-panel {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 16px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .info-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }
  .info-item .key { color: #888; }
  .info-item .value {
    font-weight: 700;
    color: #ce93d8;
    font-size: 14px;
  }
  .info-item .value.warn { color: #ff8a65; }
  .legend {
    display: flex;
    gap: 18px;
    justify-content: center;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: #aaa;
  }
  .legend-dot {
    width: 12px;
    height: 3px;
    border-radius: 2px;
  }
  .toggle-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .btn-toggle {
    padding: 8px 16px;
    border: 2px solid transparent;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
    background: rgba(255,255,255,0.06);
    color: #777;
  }
  .btn-toggle:hover {
    background: rgba(255,255,255,0.12);
    color: #ccc;
  }
  .btn-toggle.on {
    color: #fff;
  }
  .btn-toggle.on.incident  { background: rgba(255,112,67,0.25);  border-color: rgba(255,112,67,0.55); }
  .btn-toggle.on.reflected { background: rgba(66,165,245,0.25);  border-color: rgba(66,165,245,0.55); }
  .btn-toggle.on.envelope  { background: rgba(255,138,101,0.25); border-color: rgba(255,138,101,0.6); }
  .btn-toggle .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
  .btn-toggle.off .dot { opacity: 0.3; }
  .btn-toggle.on.incident  .dot { background: #ff7043; box-shadow: 0 0 6px #ff7043; }
  .btn-toggle.on.reflected .dot { background: #42a5f5; box-shadow: 0 0 6px #42a5f5; }
  .btn-toggle.on.envelope  .dot { background: #ff8a65; box-shadow: 0 0 6px #ff8a65; }
  .btn-toggle.off          .dot { background: #555; }
  @media (max-width: 600px) {
    .container { padding: 18px 14px; }
    .controls { gap: 10px; }
    .control-group { min-width: 130px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>驻 波 演 示</h1>
  <p class="subtitle">O（波源 / 固定结点）—— P（反射点 / 固定结点）· OP = 4m · 入射波 + 反射波 → 驻波</p>

  <canvas id="canvas" width="920" height="440"></canvas>

  <!-- 图例 -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ff7043;"></div> 入射波（向右）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#42a5f5;"></div> 反射波（向左）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffd54f; height:4px;"></div> 驻波（叠加）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff8a65; height:2px; border-radius:0; border-top:2px dashed #ff8a65; width:14px;"></div> 包络线</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fff; width:8px; height:8px; border-radius:50%;"></div> 波节</div>
    <div class="legend-item"><div class="legend-dot" style="background:#69f0ae; width:8px; height:8px; border-radius:50%;"></div> 波腹</div>
  </div>

  <!-- 显示/隐藏 切换按钮 -->
  <div class="toggle-row">
    <button class="btn-toggle on incident"  id="btnIncident"  title="显示/隐藏入射波（右行波）">
      <span class="dot"></span>入射波（右行）
    </button>
    <button class="btn-toggle on reflected" id="btnReflected" title="显示/隐藏反射波（左行波）">
      <span class="dot"></span>反射波（左行）
    </button>
    <button class="btn-toggle on envelope"  id="btnEnvelope"  title="显示/隐藏振幅包络线">
      <span class="dot"></span>包络线
    </button>
  </div>

  <!-- 控制面板 -->
  <div class="controls">
    <div class="control-group">
      <label>波速 v <span class="val" id="speedVal">20 m/s</span></label>
      <input type="range" id="speedSlider" min="5" max="50" step="1" value="20">
    </div>
    <div class="control-group">
      <label>振幅 A <span class="val" id="ampVal">1.414 cm</span></label>
      <input type="range" id="ampSlider" min="0.5" max="5" step="0.001" value="1.414">
    </div>
    <div class="control-group">
      <label>频率 f <span class="val" id="freqVal">10.0 Hz</span></label>
      <input type="range" id="freqSlider" min="1" max="30" step="0.1" value="10">
    </div>
    <div class="control-group">
      <label>时间 t <span class="val" id="timeVal">0.000 s</span></label>
      <input type="range" id="timeSlider" min="0" max="0.2" step="0.001" value="0">
    </div>
    <div class="btn-row">
      <button class="btn-play" id="btnPlay" title="播放 / 暂停">▶ 播放</button>
      <button class="btn-reset" id="btnReset">↺ 重置</button>
    </div>
  </div>

  <!-- 参数显示 -->
  <div class="info-panel">
    <div class="info-item"><span class="key">波速</span> <span class="value" id="speedInfoVal">v = 20 m/s</span></div>
    <div class="info-item"><span class="key">波长</span> <span class="value" id="lambdaVal">λ = 2.00 m</span></div>
    <div class="info-item"><span class="key">周期</span> <span class="value" id="periodVal">T = 0.100 s</span></div>
    <div class="info-item"><span class="key">振幅</span> <span class="value" id="ampInfoVal">A = 1.414 cm</span></div>
    <div class="info-item"><span class="key">OP</span> <span class="value" id="opLambdaVal">= 2.00 λ</span></div>
    <div class="info-item">
      <span class="key">共振条件</span>
      <span class="value" id="resonanceVal">满足 ✓</span>
    </div>
    <div class="info-item"><span class="key">波节数</span> <span class="value" id="nodeCount">5</span></div>
  </div>
</div>

<script>
  // ============================================================
  //  物理常数
  // ============================================================
  const L   = 4;            // OP 距离 m（固定）

  // ============================================================
  //  DOM
  // ============================================================
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');

  const speedSlider = document.getElementById('speedSlider');
  const ampSlider   = document.getElementById('ampSlider');
  const freqSlider  = document.getElementById('freqSlider');
  const timeSlider  = document.getElementById('timeSlider');
  const btnPlay     = document.getElementById('btnPlay');

  const speedValEl     = document.getElementById('speedVal');
  const ampValEl       = document.getElementById('ampVal');
  const freqValEl      = document.getElementById('freqVal');
  const timeValEl      = document.getElementById('timeVal');
  const speedInfoValEl = document.getElementById('speedInfoVal');
  const ampInfoValEl   = document.getElementById('ampInfoVal');
  const lambdaValEl    = document.getElementById('lambdaVal');
  const periodValEl    = document.getElementById('periodVal');
  const opLambdaValEl  = document.getElementById('opLambdaVal');
  const resonanceValEl = document.getElementById('resonanceVal');
  const nodeCountEl    = document.getElementById('nodeCount');

  const btnIncident  = document.getElementById('btnIncident');
  const btnReflected = document.getElementById('btnReflected');
  const btnEnvelope  = document.getElementById('btnEnvelope');

  // ============================================================
  //  状态
  // ============================================================
  let frequency = 10;       // Hz
  let waveSpeed = 20;       // m/s
  let ampCm     = 1.414;    // 振幅 cm
  let time      = 0;        // s
  let playing   = false;
  let lastFrameTime = null;
  let animId    = null;

  // 图层显隐
  let showIncident  = true;
  let showReflected = true;
  let showEnvelope  = true;

  // ============================================================
  //  派生量
  // ============================================================
  function lambda(f)  { return waveSpeed / f; }
  function omega(f)   { return 2 * Math.PI * f; }
  function kNumber(f) { return 2 * Math.PI / lambda(f); }

  // ============================================================
  //  波动方程（核心物理）
  // ============================================================
  //
  //  入射波（向右传播）:  y₁(x,t) = A·sin(kx - ωt)
  //  反射波（向左传播）:  y₂(x,t) = -A·sin(k(2L - x) - ωt)
  //
  //  反射公式推导 — 固定端边界条件 y(L,t) ≡ 0:
  //    在 x = L 处，入射波位移 y₁(L,t) = A·sin(kL - ωt)
  //    反射波必须是左行波: y₂(x,t) = B·sin(kx + ωt + φ)
  //    由 y₁(L,t) + y₂(L,t) = 0:
  //      A·sin(kL - ωt) + B·sin(kL + ωt + φ) = 0  ∀t
  //    → B = A, φ = π - 2kL
  //    → y₂(x,t) = A·sin(kx + ωt + π - 2kL)
  //              = -A·sin(2kL - kx - ωt)
  //              = -A·sin(k(2L - x) - ωt)   ✓
  //
  //  叠加:
  //    y(x,t) = y₁ + y₂
  //           = A·sin(kx - ωt) - A·sin(k(2L - x) - ωt)
  //           = 2A·cos(kL - ωt)·sin(kx - kL)
  //
  //  振幅包络:  |2A·sin(kx - kL)| = 2A·|sin(k(L - x))|
  //
  //  波节: sin(k(L - x)) = 0 → k(L - x) = nπ → x = L - n·λ/2
  //  波腹: |sin(k(L - x))| = 1 → k(L - x) = (n+½)π → x = L - (n+½)·λ/2
  //
  //  P(x=L): 包络 = 2A·|sin(0)| = 0 → 恒为波节 ✓
  //  O(x=0): 包络 = 2A·|sin(kL)|, 为零当且仅当 kL = nπ（共振条件）✓

  function incidentWave(x, t, f) {
    const k = kNumber(f);
    return (ampCm / 100) * Math.sin(k * x - omega(f) * t);
  }

  function reflectedWave(x, t, f) {
    const k = kNumber(f);
    return -(ampCm / 100) * Math.sin(k * (2 * L - x) - omega(f) * t);
  }

  function standingWave(x, t, f) {
    return incidentWave(x, t, f) + reflectedWave(x, t, f);
  }

  function envelopeAmplitude(x, f) {
    const k = kNumber(f);
    return 2 * (ampCm / 100) * Math.abs(Math.sin(k * (L - x)));
  }

  // 共振判断: kL 是否为 π 的整数倍（容忍 0.001 rad）
  function isResonant(f) {
    const kL = kNumber(f) * L;
    const n = Math.round(kL / Math.PI);
    return Math.abs(kL - n * Math.PI) < 0.002;
  }

  // 波节位置数组
  function computeNodes(f) {
    const lam = lambda(f);
    const pts = [];
    // x = L - n * λ/2, n = 0,1,2,...  while x >= 0
    for (let n = 0; ; n++) {
      const x = L - n * lam / 2;
      if (x < -0.001) break;
      if (x >= -0.001 && x <= L + 0.001) pts.push(Math.max(0, Math.min(L, x)));
    }
    // 去重+排序
    const uniq = [...new Set(pts.map(v => v.toFixed(6)))].map(Number).sort((a, b) => a - b);
    return uniq;
  }

  // 波腹位置数组
  function computeAntinodes(f) {
    const lam = lambda(f);
    const pts = [];
    for (let n = 0; ; n++) {
      const x = L - (n + 0.5) * lam / 2;
      if (x < -0.001) break;
      if (x >= -0.001 && x <= L + 0.001) pts.push(Math.max(0, Math.min(L, x)));
    }
    const uniq = [...new Set(pts.map(v => v.toFixed(6)))].map(Number).sort((a, b) => a - b);
    return uniq;
  }

  // ============================================================
  //  绘制
  // ============================================================
  function draw() {
    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // -- 坐标映射 --
    const margin = { left: 90, right: 70, top: 55, bottom: 65 };
    const plotW = W - margin.left - margin.right;
    const plotH = H - margin.top - margin.bottom;
    const zeroY = margin.top + plotH / 2;

    const xToPx = (x) => margin.left + (x / L) * plotW;
    // y 轴范围: 包络最大 2·ampCm，留 40% 余量，至少 ±1.5cm
    const yMax   = Math.max(ampCm * 2 * 1.4, 1.5);
    const yToPy  = (y) => zeroY - (y / (yMax / 100)) * (plotH / 2);

    const f  = frequency;
    const t  = time;
    const lam = lambda(f);
    const k   = kNumber(f);

    // ---- 网格 & 坐标轴 ----
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= L; i++) {
      const px = xToPx(i);
      ctx.beginPath(); ctx.moveTo(px, margin.top); ctx.lineTo(px, margin.top + plotH); ctx.stroke();
    }
    // 水平网格线（动态范围）
    const yStepG = yMax >= 8 ? 2 : (yMax >= 4 ? 1 : 0.5);
    for (let yCm = yStepG; yCm <= yMax; yCm += yStepG) {
      const py = yToPy(yCm / 100);
      ctx.beginPath(); ctx.moveTo(margin.left, py); ctx.lineTo(margin.left + plotW, py); ctx.stroke();
      const py2 = yToPy(-yCm / 100);
      ctx.beginPath(); ctx.moveTo(margin.left, py2); ctx.lineTo(margin.left + plotW, py2); ctx.stroke();
    }

    // 零线（加粗）
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(margin.left, zeroY); ctx.lineTo(margin.left + plotW, zeroY);
    ctx.stroke();

    // ---- x 轴标注 ----
    ctx.fillStyle = '#777';
    ctx.font = '11px "Microsoft YaHei"';
    ctx.textAlign = 'center';
    for (let i = 0; i <= L; i++) {
      const px = xToPx(i);
      ctx.fillText(i + 'm', px, zeroY + 18);
    }

    // O、P 特殊标注
    ctx.fillStyle = '#ff7043';
    ctx.font = 'bold 13px "Microsoft YaHei"';
    ctx.fillText('O', xToPx(0), zeroY + 36);
    ctx.fillText('P', xToPx(L), zeroY + 36);

    // ---- y 轴标注（动态范围） ----
    ctx.fillStyle = '#888';
    ctx.textAlign = 'right';
    const yStep = yMax >= 8 ? 2 : (yMax >= 4 ? 1 : 0.5);
    for (let yCm = yStep; yCm <= yMax; yCm += yStep) {
      const py = yToPy(yCm / 100);
      ctx.fillText('+' + yCm.toFixed(yStep < 1 ? 1 : 0) + 'cm', margin.left - 10, py + 4);
      const py2 = yToPy(-yCm / 100);
      ctx.fillText('-' + yCm.toFixed(yStep < 1 ? 1 : 0) + 'cm', margin.left - 10, py2 + 4);
    }

    // ---- 振幅包络（虚线） ----
    if (showEnvelope) {
      ctx.strokeStyle = 'rgba(255,138,101,0.7)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 8]);
      // 上包络
      ctx.beginPath();
      let first = true;
      for (let px = 0; px <= plotW; px += 2) {
        const x = (px / plotW) * L;
        const amp = envelopeAmplitude(x, f) * 100;
        const py = yToPy(amp / 100);
        if (first) { ctx.moveTo(margin.left + px, py); first = false; }
        else { ctx.lineTo(margin.left + px, py); }
      }
      ctx.stroke();
      // 下包络
      ctx.beginPath();
      first = true;
      for (let px = 0; px <= plotW; px += 2) {
        const x = (px / plotW) * L;
        const amp = -envelopeAmplitude(x, f) * 100;
        const py = yToPy(amp / 100);
        if (first) { ctx.moveTo(margin.left + px, py); first = false; }
        else { ctx.lineTo(margin.left + px, py); }
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // ---- 入射波（向右） ----
    if (showIncident) {
      ctx.strokeStyle = 'rgba(255,112,67,0.75)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      let first = true;
      for (let px = 0; px <= plotW; px += 1) {
        const x = (px / plotW) * L;
        const y = incidentWave(x, t, f) * 100;
        const py = yToPy(y / 100);
        if (first) { ctx.moveTo(margin.left + px, py); first = false; }
        else { ctx.lineTo(margin.left + px, py); }
      }
      ctx.stroke();
    }

    // ---- 反射波（向左） ----
    if (showReflected) {
      ctx.strokeStyle = 'rgba(66,165,245,0.75)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      let first = true;
      for (let px = 0; px <= plotW; px += 1) {
        const x = (px / plotW) * L;
        const y = reflectedWave(x, t, f) * 100;
        const py = yToPy(y / 100);
        if (first) { ctx.moveTo(margin.left + px, py); first = false; }
        else { ctx.lineTo(margin.left + px, py); }
      }
      ctx.stroke();
    }

    // ---- 驻波（叠加结果） ----
    ctx.strokeStyle = '#ffd54f';
    ctx.lineWidth = 3.2;
    ctx.shadowColor = 'rgba(255,213,79,0.55)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    let firstSw = true;
    for (let px = 0; px <= plotW; px += 1) {
      const x = (px / plotW) * L;
      const y = standingWave(x, t, f) * 100;
      const py = yToPy(y / 100);
      if (firstSw) { ctx.moveTo(margin.left + px, py); firstSw = false; }
      else { ctx.lineTo(margin.left + px, py); }
    }
    ctx.stroke();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // ---- 标记 O、P 为固定结点 ----
    const nodes = computeNodes(f);
    const antinodes = computeAntinodes(f);

    // 先画波腹（绿色小圆）
    antinodes.forEach(xa => {
      const px = xToPx(xa);
      ctx.beginPath();
      ctx.arc(px, zeroY, 5.5, 0, 2 * Math.PI);
      ctx.fillStyle = '#69f0ae';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 1.2;
      ctx.stroke();
    });

    // 再画波节（白色圆，O 和 P 用特殊标记）
    nodes.forEach(xn => {
      const px = xToPx(xn);
      const isEndpoint = (Math.abs(xn) < 0.005 || Math.abs(xn - L) < 0.005);

      // 外圈光晕
      if (isEndpoint) {
        ctx.beginPath();
        ctx.arc(px, zeroY, 9, 0, 2 * Math.PI);
        ctx.fillStyle = 'rgba(255,112,67,0.3)';
        ctx.fill();
      }

      // 主圆
      ctx.beginPath();
      ctx.arc(px, zeroY, isEndpoint ? 7 : 5.5, 0, 2 * Math.PI);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
      ctx.lineWidth = isEndpoint ? 2 : 1.2;
      ctx.stroke();

      // O 和 P 加文字
      if (isEndpoint) {
        ctx.fillStyle = '#ff7043';
        ctx.font = 'bold 11px "Microsoft YaHei"';
        ctx.textAlign = 'center';
        const label = Math.abs(xn) < 0.005 ? 'O' : 'P';
        ctx.fillText(label, px, zeroY - 14);
      }
    });

    // ---- O 点的入射波振动指示器 ----
    if (showIncident) {
      const o1y = incidentWave(0, t, f) * 100;
      const o1py = yToPy(o1y / 100);
      ctx.fillStyle = '#ff7043';
      ctx.beginPath();
      ctx.arc(xToPx(0), o1py, 3.5, 0, 2 * Math.PI);
      ctx.fill();
    }

    // ---- 共振指示条（画布右上角） ----
    const resonant = isResonant(f);
    ctx.fillStyle = resonant ? 'rgba(46,125,50,0.85)' : 'rgba(109,76,65,0.85)';
    ctx.font = 'bold 13px "Microsoft YaHei"';
    ctx.textAlign = 'right';
    const resText = resonant ? '✓ 共振驻波' : '✗ 非共振（O点非波节）';
    const rx = margin.left + plotW - 12;
    const ry = margin.top + 18;
    // 背景
    const tw = ctx.measureText(resText).width;
    ctx.fillStyle = resonant ? 'rgba(46,125,50,0.22)' : 'rgba(109,76,65,0.22)';
    ctx.fillRect(rx - tw - 10, ry - 14, tw + 20, 24);
    ctx.fillStyle = resonant ? '#a5d6a7' : '#ffab91';
    ctx.fillText(resText, rx, ry + 4);

    // ---- 更新 UI 数值 ----
    speedValEl.textContent     = waveSpeed + ' m/s';
    ampValEl.textContent       = ampCm.toFixed(3) + ' cm';
    freqValEl.textContent      = f.toFixed(1) + ' Hz';
    timeValEl.textContent      = t.toFixed(3) + ' s';
    speedInfoValEl.textContent = 'v = ' + waveSpeed + ' m/s';
    ampInfoValEl.textContent   = 'A = ' + ampCm.toFixed(3) + ' cm';
    lambdaValEl.textContent    = 'λ = ' + lam.toFixed(2) + ' m';
    periodValEl.textContent    = 'T = ' + (1 / f).toFixed(3) + ' s';
    opLambdaValEl.textContent  = '= ' + (L / lam).toFixed(2) + ' λ';
    nodeCountEl.textContent    = nodes.length + ' 个';

    if (resonant) {
      resonanceValEl.textContent = '满足 ✓  kL = ' + (k * L / Math.PI).toFixed(0) + 'π';
      resonanceValEl.className = 'value';
    } else {
      const kLn = k * L / Math.PI;
      resonanceValEl.textContent = '不满足  kL/π = ' + kLn.toFixed(3);
      resonanceValEl.className = 'value warn';
    }
  }

  // ============================================================
  //  动画循环
  // ============================================================
  function animate(timestamp) {
    if (!playing) return;
    if (lastFrameTime === null) lastFrameTime = timestamp;

    let dt = (timestamp - lastFrameTime) / 1000;
    if (dt > 0.1) dt = 0.05;   // 防止跳帧

    time += dt;
    // 循环回绕
    const period = 1 / frequency;
    if (time > period * 4) time -= period * 4;

    timeSlider.value = time;
    draw();

    lastFrameTime = timestamp;
    animId = requestAnimationFrame(animate);
  }

  function startAnimation() {
    if (playing) return;
    playing = true;
    lastFrameTime = null;
    btnPlay.textContent = '⏸ 暂停';
    btnPlay.classList.add('paused');
    animId = requestAnimationFrame(animate);
  }

  function stopAnimation() {
    playing = false;
    btnPlay.textContent = '▶ 播放';
    btnPlay.classList.remove('paused');
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    lastFrameTime = null;
  }

  // ============================================================
  //  事件
  // ============================================================
  speedSlider.addEventListener('input', () => {
    waveSpeed = parseFloat(speedSlider.value);
    draw();
  });

  ampSlider.addEventListener('input', () => {
    ampCm = parseFloat(ampSlider.value);
    draw();
  });

  freqSlider.addEventListener('input', () => {
    frequency = parseFloat(freqSlider.value);
    timeSlider.max = (1 / frequency) * 2;
    draw();
  });

  timeSlider.addEventListener('input', () => {
    time = parseFloat(timeSlider.value);
    draw();
  });

  btnPlay.addEventListener('click', () => {
    playing ? stopAnimation() : startAnimation();
  });

  // ---- 图层显隐切换 ----
  function toggleBtn(btn, show) {
    if (show) {
      btn.classList.add('on');
      btn.classList.remove('off');
    } else {
      btn.classList.remove('on');
      btn.classList.add('off');
    }
  }

  btnIncident.addEventListener('click', () => {
    showIncident = !showIncident;
    toggleBtn(btnIncident, showIncident);
    draw();
  });

  btnReflected.addEventListener('click', () => {
    showReflected = !showReflected;
    toggleBtn(btnReflected, showReflected);
    draw();
  });

  btnEnvelope.addEventListener('click', () => {
    showEnvelope = !showEnvelope;
    toggleBtn(btnEnvelope, showEnvelope);
    draw();
  });

  document.getElementById('btnReset').addEventListener('click', () => {
    stopAnimation();
    waveSpeed = 20;
    ampCm     = 1.414;
    frequency = 10;
    time      = 0;
    speedSlider.value = 20;
    ampSlider.value   = 1.414;
    freqSlider.value  = 10;
    timeSlider.value  = 0;
    timeSlider.max    = (1 / frequency) * 2;
    // 重置图层显隐
    showIncident  = true;  toggleBtn(btnIncident,  true);
    showReflected = true;  toggleBtn(btnReflected, true);
    showEnvelope  = true;  toggleBtn(btnEnvelope,  true);
    draw();
  });

  // ============================================================
  //  初始化
  // ============================================================
  timeSlider.max = (1 / frequency) * 2;
  draw();
  startAnimation();
</script>
</body>
</html>
