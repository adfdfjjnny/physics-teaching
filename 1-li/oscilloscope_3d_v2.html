<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>示波管3D原理模型</title>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --accent: #58a6ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI','Microsoft YaHei',sans-serif; overflow:hidden; height:100vh; }
  #c3d { position:fixed; top:0; left:0; width:100%; height:100%; }
  #ui { position:fixed; top:16px; right:16px; z-index:10; display:flex; flex-direction:column; gap:10px; pointer-events:none; }
  #ui>* { pointer-events:auto; }
  .panel { background:rgba(22,27,34,0.92); border:1px solid var(--border); border-radius:10px; padding:14px; backdrop-filter:blur(12px); width:270px; }
  .panel h3 { font-size:0.9em; color:var(--accent); margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:6px; }
  .ctrl { margin-bottom:10px; }
  .ctrl label { display:block; font-size:0.78em; color:#8b949e; margin-bottom:3px; }
  .ctrl .val { float:right; color:var(--accent); font-weight:bold; }
  input[type="range"] { width:100%; accent-color:var(--accent); cursor:pointer; }
  button { background:#21262d; color:var(--text); border:1px solid var(--border); padding:7px 12px; border-radius:6px; cursor:pointer; font-size:0.8em; margin:2px; }
  button:hover { background:#30363d; }
  button.on { background:#1f6feb33; border-color:var(--accent); color:var(--accent); }
  .row { display:flex; gap:4px; }
  .row button { flex:1; white-space:nowrap; }
  .legend { font-size:0.72em; color:#8b949e; line-height:1.6; margin-top:6px; }
  .legend span { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:4px; vertical-align:middle; }
  #hint { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:10; color:rgba(255,255,255,0.5); font-size:0.78em; pointer-events:none; }
  #title { position:fixed; top:16px; left:24px; z-index:10; pointer-events:none; }
  #title h1 { font-size:1.4em; background:linear-gradient(90deg,#58a6ff,#3fb950); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
</style>
</head>
<body>
<div id="c3d"></div>
<div id="title"><h1>⚡ 示波管 3D 原理模型</h1></div>
<div id="ui">
  <div class="panel">
    <h3>🎛️ 偏转控制</h3>
    <div class="ctrl"><label>Y偏转电压 ↑↓ <span class="val" id="vyVal">0 V</span></label><input type="range" id="vySlider" min="-100" max="100" value="0" step="1"></div>
    <div class="ctrl"><label>X偏转电压 ↔ <span class="val" id="vxVal">0 V</span></label><input type="range" id="vxSlider" min="-100" max="100" value="0" step="1"></div>
    <div class="row" style="margin-top:4px"><button id="btnField">⚡ 电场线</button><button id="btnTrail">✨ 轨迹线</button></div>
    <div class="row" style="margin-top:4px"><button id="btnPlate">🪨 偏转板</button></div>
    <button id="btnReset" style="width:100%;margin-top:4px;">↺ 重置</button>
  </div>
  <div class="panel">
    <h3>📐 类平抛运动</h3>
    <div style="font-size:0.8em;color:#8b949e;line-height:1.5;">电子从左端电子枪射出，以初速 <b style="color:#58a6ff">v₀</b> 水平向右进入偏转板间匀强电场。<br>受 <b>F=eE</b> 做<b style="color:#d2991d">类平抛运动</b>，轨迹为抛物线。<br>离开电场后匀速直线飞向<b style="color:#3fb950">荧光屏</b>。</div>
    <div class="legend"><span style="background:#00ff88"></span> 电子束 &nbsp;<span style="background:#ff8800"></span> 电场线 &nbsp;<span style="background:#ff4466"></span> 撞击点</div>
  </div>
</div>
<div id="hint">🖱️ 左键旋转 | 滚轮缩放 | 右键平移 | 空格自动旋转</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══ DOM ═══
const $=id=>document.getElementById(id);
const vySlider=$('vySlider'),vxSlider=$('vxSlider'),vyVal=$('vyVal'),vxVal=$('vxVal');
const btnField=$('btnField'),btnTrail=$('btnTrail'),btnPlate=$('btnPlate'),btnReset=$('btnReset'),hint=$('hint');

// ═══ State ═══
let vy=0, vx=0, showField=true, showTrail=true, showPlates=true, time=0, autoRotate=false;

// ═══ Three.js Setup ═══
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.2;
$('c3d').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background=new THREE.Color(0x0a0e17);
scene.fog=new THREE.Fog(0x0a0e17,10,40);

const camera = new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.3,50);
camera.position.set(1, 3.5, 9);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0.3, 0, 0);
controls.enableDamping=true; controls.dampingFactor=0.08;
controls.minDistance=3; controls.maxDistance=18;
controls.maxPolarAngle=Math.PI*0.7;
controls.update();

// ═══ Lighting ═══
scene.add(new THREE.AmbientLight(0x334466,3));
const key=new THREE.DirectionalLight(0xffeedd,6); key.position.set(6,6,6); key.castShadow=true;
key.shadow.mapSize.set(1024,1024); key.shadow.camera.near=0.5; key.shadow.camera.far=40;
key.shadow.camera.left=-12; key.shadow.camera.right=12; key.shadow.camera.top=8; key.shadow.camera.bottom=-8;
key.shadow.bias=-0.0002; scene.add(key);
scene.add(new THREE.DirectionalLight(0x8899cc,2).position.set(-4,2,-2));

// Floor
const fl=new THREE.Mesh(new THREE.PlaneGeometry(20,20),new THREE.MeshStandardMaterial({color:0x1a1d24,roughness:0.7,metalness:0.3}));
fl.rotation.x=-Math.PI/2; fl.position.y=-3.5; fl.receiveShadow=true; scene.add(fl);
scene.add(new THREE.PolarGridHelper(8,48,24,64,0x333944,0x222830).translateY(-3.49));

// ═══ Materials ═══
const M={
  glass: new THREE.MeshPhysicalMaterial({color:0x8899cc,metalness:0.05,roughness:0.15,transparent:true,opacity:0.22,depthWrite:false}),
  metal: new THREE.MeshStandardMaterial({color:0x889099,roughness:0.35,metalness:0.9}),
  dark:  new THREE.MeshStandardMaterial({color:0x556066,roughness:0.3,metalness:0.95}),
  copper:new THREE.MeshStandardMaterial({color:0xcc9966,roughness:0.4,metalness:0.85}),
  screen:new THREE.MeshStandardMaterial({color:0x1a2a1a,roughness:0.6,metalness:0.1,transparent:true,opacity:0.65,depthWrite:false}),
  phosphor:new THREE.MeshStandardMaterial({color:0x2a4a2a,roughness:0.4,metalness:0.05,emissive:0x113311,emissiveIntensity:0.6}),
};

// ═══ Model Group — rotate so tube goes LEFT→RIGHT ═══
// Internal coords: Y=beam axis. After rotation: internal Y → world X, internal Z → world Y
const model = new THREE.Group();
model.rotation.set(-Math.PI/2, -Math.PI/2, 0); // Rx(-90°) then Ry(-90°): Y→X, Z→Y, X→Z
scene.add(model);

// ═══ CRT Envelope (built along Y, rotated to X by model group) ═══
const profilePts = [
  [-3.15,0.18],[-3.05,0.20],[-2.8,0.23],[-2.4,0.26],[-2.0,0.28],[-1.5,0.30],
  [-1.0,0.32],[-0.6,0.41],[-0.2,0.58],[0.1,0.72],[0.4,0.90],[0.7,1.10],
  [1.0,1.32],[1.35,1.55],[1.7,1.74],[2.05,1.88],[2.4,1.98],[2.7,2.06],
  [2.9,2.10],[3.02,2.12]
];
const profile=profilePts.map(([y,r])=>new THREE.Vector2(r,y));
const envelope=new THREE.Mesh(new THREE.LatheGeometry(profile,72),M.glass);
envelope.renderOrder=1; model.add(envelope);

// Rim rings
function ring(y,r,t){const m=new THREE.Mesh(new THREE.TorusGeometry(r,t,16,80),M.dark);m.rotation.x=Math.PI/2;m.position.y=y;return m;}
model.add(ring(3.02,2.10,0.04)); model.add(ring(-3.15,0.20,0.03));

// ═══ Electron Gun (y≈-2.8 internally → world x≈-2.8, left side) ═══
const gun=new THREE.Group();
function gp(geo,mat,y){const m=new THREE.Mesh(geo,mat);m.position.y=y;gun.add(m);return m;}
gp(new THREE.CylinderGeometry(0.12,0.14,0.3,32),new THREE.MeshStandardMaterial({color:0x554444,roughness:0.5,metalness:0.7}),-2.85);
const heater=gp(new THREE.SphereGeometry(0.08,16,16),new THREE.MeshBasicMaterial({color:0xff6633}),-2.72);
gp(new THREE.CylinderGeometry(0.10,0.11,0.15,32),M.dark,-2.45);
gp(new THREE.CylinderGeometry(0.10,0.09,0.4,32),M.metal,-2.05);
gp(new THREE.CylinderGeometry(0.08,0.07,0.5,32),M.metal,-1.55);
const ap=gp(new THREE.TorusGeometry(0.06,0.02,8,24),M.dark,-1.25); ap.rotation.x=Math.PI/2;
model.add(gun);

// ═══ Deflection Plates ═══
function mkPlate(x,y,z,w,h,d){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),M.copper);m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;return m;}
const pLen=0.8, pWid=0.65, pThk=0.06, pGap=0.36;
const xOff=0.45, xLen=0.7, xWid=0.55, xThk=0.06, xGap=0.40;
const plateGroup = new THREE.Group();
// Y-deflection plates: at internal z=±gap, span y=-0.4..0.4 → world Y (vertical) deflection
plateGroup.add(mkPlate(0,0, pGap, pWid,pLen,pThk));
plateGroup.add(mkPlate(0,0,-pGap, pWid,pLen,pThk));
// X-deflection plates: at internal x=±gap, span y=0.1..0.8 → world Z (depth) deflection
plateGroup.add(mkPlate( xGap,xOff,0, xThk,xLen,xWid));
plateGroup.add(mkPlate(-xGap,xOff,0, xThk,xLen,xWid));
model.add(plateGroup);

// ═══ Fluorescent Screen ═══
// Layered discs with sufficient spacing to prevent z-fighting
const screenDisc=new THREE.Mesh(
  new THREE.CylinderGeometry(2.05, 2.05, 0.04, 72),
  new THREE.MeshStandardMaterial({color:0x1a2a1a, roughness:0.6, metalness:0.1, transparent:true, opacity:0.5, depthWrite:false})
);
screenDisc.position.y=3.02; model.add(screenDisc);  // faces at 3.00 & 3.04

const phosDisc=new THREE.Mesh(
  new THREE.CylinderGeometry(2.02, 2.02, 0.01, 72),
  new THREE.MeshStandardMaterial({color:0x2a4a2a, roughness:0.4, metalness:0.05, emissive:0x113311, emissiveIntensity:0.5, depthWrite:false})
);
phosDisc.position.y=3.07; model.add(phosDisc); // faces at 3.065 & 3.075

// Graticule grid plane — faces +Y internally (so after rotation, faces +X = outward to the right)
const gc=document.createElement('canvas');gc.width=512;gc.height=512;
const gctx=gc.getContext('2d');
gctx.fillStyle='rgba(10,26,10,0.6)';gctx.fillRect(0,0,512,512);
gctx.strokeStyle='rgba(60,140,60,0.4)';gctx.lineWidth=1;
for(let i=1;i<8;i++){const p=(i/8)*512;gctx.beginPath();gctx.moveTo(p,40);gctx.lineTo(p,472);gctx.stroke();gctx.beginPath();gctx.moveTo(40,p);gctx.lineTo(472,p);gctx.stroke();}
gctx.strokeStyle='rgba(80,160,80,0.55)';gctx.lineWidth=1.5;
gctx.beginPath();gctx.moveTo(256,40);gctx.lineTo(256,472);gctx.stroke();
gctx.beginPath();gctx.moveTo(40,256);gctx.lineTo(472,256);gctx.stroke();
const grateTex=new THREE.CanvasTexture(gc);grateTex.colorSpace=THREE.SRGBColorSpace;
const gratePlane=new THREE.Mesh(new THREE.PlaneGeometry(3.9,3.9),new THREE.MeshBasicMaterial({map:grateTex,transparent:true,opacity:0.55,side:THREE.DoubleSide,depthTest:true,depthWrite:false}));
gratePlane.rotation.x=-Math.PI/2; // face +Y internally → world +X after model rotation
gratePlane.position.y=3.13; // well in front of phosDisc (3.07) to avoid z-fighting
gratePlane.renderOrder=3;
model.add(gratePlane);

// ═══ Beam Physics (internal Y = beam axis → world X) ═══
const BS=-2.72, BE=3.09; // beam ends near phosDisc (3.07→3.075)
const NPT=300;

function beamY(x_tube, Vy){ // Y deflection (vertical on screen) — internal Z → world Y
  const V=Vy/100, entry=-pLen/2, exit=pLen/2, L=exit-entry, k=0.38;
  if(x_tube<=entry)return 0;
  if(x_tube<=exit){const t=x_tube-entry;return k*V*t*t;}
  const tExit=L,zExit=k*V*tExit*tExit,vzExit=2*k*V*tExit;
  return zExit+vzExit*(x_tube-exit);
}
function beamZ(x_tube, Vx){ // X deflection — electron (−e): force opposes E-field → flip sign
  const V=-Vx/100, entry=xOff-xLen/2, exit=xOff+xLen/2, L=exit-entry, k=0.38;
  if(x_tube<=entry)return 0;
  if(x_tube<=exit){const t=x_tube-entry;return k*V*t*t;}
  const tExit=L,xExit=k*V*tExit*tExit,vxExit=2*k*V*tExit;
  return xExit+vxExit*(x_tube-exit);
}

// ═══ Beam Visualization ═══
let beamTube=null, beamLine=null;
const matTube=new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:0.75,depthTest:true,depthWrite:false});
const matGlow=new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:0.25,depthTest:true,depthWrite:false});

function buildBeam(){
  if(beamTube){model.remove(beamTube);beamTube=null;}
  if(beamLine){model.remove(beamLine);beamLine=null;}

  // Thick tube
  const pts=[];
  for(let i=0;i<=120;i++){
    const y=BS+(BE-BS)*(i/120);
    pts.push(new THREE.Vector3(beamZ(y,vx), y, beamY(y,vy))); // (internal X, Y, Z)
  }
  const curve=new THREE.CatmullRomCurve3(pts);
  const tGeo=new THREE.TubeGeometry(curve,160,0.03,12,false);
  beamTube=new THREE.Mesh(tGeo,matTube);
  beamTube.renderOrder=2; beamTube.visible=showTrail; model.add(beamTube);

  // Thin line
  const pos=new Float32Array(NPT*3);
  for(let i=0;i<NPT;i++){
    const y=BS+(BE-BS)*(i/(NPT-1));
    pos[i*3]=beamZ(y,vx); pos[i*3+1]=y; pos[i*3+2]=beamY(y,vy);
  }
  const lGeo=new THREE.BufferGeometry(); lGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  beamLine=new THREE.Line(lGeo,new THREE.LineBasicMaterial({color:0x44ffaa,transparent:true,opacity:0.55,depthTest:true}));
  beamLine.renderOrder=4; beamLine.visible=showTrail; model.add(beamLine);
}

// ═══ Impact Glow ═══
const gC=document.createElement('canvas');gC.width=64;gC.height=64;
const gTx=gC.getContext('2d');const gg=gTx.createRadialGradient(32,32,0,32,32,32);
gg.addColorStop(0,'rgba(255,255,255,1)');gg.addColorStop(0.08,'rgba(100,255,150,0.95)');
gg.addColorStop(0.25,'rgba(0,220,80,0.7)');gg.addColorStop(0.55,'rgba(0,150,40,0.25)');
gg.addColorStop(1,'rgba(0,40,10,0)');gTx.fillStyle=gg;gTx.fillRect(0,0,64,64);
const gTex=new THREE.CanvasTexture(gC);gTex.colorSpace=THREE.SRGBColorSpace;
const impactSprite=new THREE.Sprite(new THREE.SpriteMaterial({map:gTex,blending:THREE.AdditiveBlending,depthTest:true,depthWrite:false}));
impactSprite.scale.set(0.5,0.5,1);impactSprite.renderOrder=6;model.add(impactSprite);

function updateImpact(){
  const ix=beamZ(BE,vx), iy=BE, iz=beamY(BE,vy); // impact at beam endpoint on screen surface
  impactSprite.position.set(ix, iy, iz);
  impactSprite.scale.setScalar(0.3+0.2*Math.abs(Math.sin(time*8)));
}

// ═══ Electron Particles ═══
const electrons=[]; const MAX_E=100, RATE=70; let eAcc=0;
const eC=document.createElement('canvas');eC.width=16;eC.height=16;
const eTx=eC.getContext('2d');const eg=eTx.createRadialGradient(8,8,0,8,8,8);
eg.addColorStop(0,'rgba(255,255,255,1)');eg.addColorStop(0.2,'rgba(150,255,200,1)');
eg.addColorStop(0.5,'rgba(0,220,100,0.6)');eg.addColorStop(1,'rgba(0,80,30,0)');
eTx.fillStyle=eg;eTx.fillRect(0,0,16,16);
const eTex=new THREE.CanvasTexture(eC);eTex.colorSpace=THREE.SRGBColorSpace;

function spawnE(){
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:eTex,blending:THREE.AdditiveBlending,depthTest:true,depthWrite:false}));
  s.scale.set(0.1,0.1,1);s.renderOrder=4;
  s.userData={age:0,maxAge:2.6+Math.random()*0.4,bVy:vy,bVx:vx};
  s.position.set(0,BS,0);model.add(s);electrons.push(s);
}
function updateE(dt){
  eAcc+=dt;
  while(eAcc>=1/RATE&&electrons.length<MAX_E){eAcc-=1/RATE;spawnE();}
  for(let i=electrons.length-1;i>=0;i--){
    const s=electrons[i];s.userData.age+=dt;
    if(s.userData.age>=s.userData.maxAge){model.remove(s);s.material.dispose();electrons.splice(i,1);continue;}
    const t=s.userData.age/s.userData.maxAge,y=BS+t*(BE-BS);
    s.position.set(beamZ(y,s.userData.bVx),y,beamY(y,s.userData.bVy));
    const a=t<0.05?t/0.05:(t>0.85?(1-t)/0.15:1);
    s.material.opacity=a*0.85;s.scale.setScalar(0.05+a*0.06);
  }
  while(electrons.length>MAX_E){const s=electrons.shift();model.remove(s);s.material.dispose();}
}

// ═══ Field Arrows ═══
const arrows=[];
function mkArrow(x,y,z,rx,ry,rz){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,0.22,8),new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.6,depthTest:true})).translateY(0.11));
  g.add(new THREE.Mesh(new THREE.ConeGeometry(0.04,0.1,8),new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.7,depthTest:true})).translateY(0.24));
  g.position.set(x,y,z);g.rotation.set(rx,ry,rz);g.visible=false;model.add(g);return g;
}
// Y-plate arrows (internal Z direction → world Y after rotation)
for(let i=0;i<7;i++){const fy=-0.38+i*0.125;for(let r=-2;r<=2;r++)arrows.push(mkArrow(r*0.08,fy,0,-Math.PI/2,0,0));}
// X-plate arrows (internal X direction → world Z after rotation)
for(let i=0;i<7;i++){const fy=xOff-xLen/2+0.05+i*(xLen-0.1)/6;for(let r=-2;r<=2;r++)arrows.push(mkArrow(0,fy,r*0.08,0,0,-Math.PI/2));}
const nYA=7*5;

function updateArrows(){
  const sY=showField&&Math.abs(vy)>2, sX=showField&&Math.abs(vx)>2;
  arrows.forEach((a,i)=>{
    if(i<nYA){a.visible=sY;a.rotation.x=vy>0?-Math.PI/2:Math.PI/2;}
    else{a.visible=sX;a.rotation.z=vx>0?-Math.PI/2:Math.PI/2;}
  });
}

// ═══ Voltage ═══
function applyV(nv,nx){
  vy=nv;vx=nx;
  buildBeam();updateImpact();updateArrows();
}

// ═══ Frame ═══
function frame(dt){
  updateE(dt);
}

// ═══ Animation ═══
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  let dt=clock.getDelta();if(dt>0.1)dt=0.016;time+=dt;
  controls.update();
  const f=0.82+0.18*Math.sin(time*23)*Math.sin(time*17);
  heater.material.color.setRGB(1*f,0.33*f,0.1*f);
  frame(dt);
  renderer.render(scene,camera);
  if(time>6){hint.style.transition='opacity 1.5s';hint.style.opacity='0';}
}

// ═══ Sliders ═══
vySlider.addEventListener('input',()=>{const v=parseInt(vySlider.value);vyVal.textContent=v+' V';applyV(v,vx);});
vxSlider.addEventListener('input',()=>{const v=parseInt(vxSlider.value);vxVal.textContent=v+' V';applyV(vy,v);});

// ═══ Buttons ═══
function updateUI(){
  btnField.classList.toggle('on',showField);btnTrail.classList.toggle('on',showTrail);
  btnPlate.classList.toggle('on',showPlates);
}
btnField.addEventListener('click',()=>{
  showField=!showField;updateUI();
  if(showField)updateArrows(); else arrows.forEach(a=>a.visible=false);
});
btnTrail.addEventListener('click',()=>{showTrail=!showTrail;updateUI();if(beamTube)beamTube.visible=showTrail;if(beamLine)beamLine.visible=showTrail;});
btnPlate.addEventListener('click',()=>{
  showPlates=!showPlates;updateUI();
  plateGroup.children.forEach(c=>{c.visible=showPlates;});
});
btnReset.addEventListener('click',()=>{
  time=0;vySlider.value=0;vxSlider.value=0;vyVal.textContent='0 V';vxVal.textContent='0 V';
  applyV(0,0);updateUI();
  while(electrons.length){const s=electrons.pop();model.remove(s);s.material.dispose();}
  camera.position.set(1,3.5,9);controls.target.set(0.3,0,0);controls.update();
  arrows.forEach(a=>a.visible=false);
});

// ═══ Keyboard ═══
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();autoRotate=!autoRotate;controls.autoRotate=autoRotate;}});
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

// Prevent orbit controls from eating slider events
document.querySelectorAll('input[type="range"]').forEach(s=>{s.addEventListener('pointerdown',e=>e.stopPropagation());s.addEventListener('touchstart',e=>e.stopPropagation());});

// ═══ Init ═══
updateUI();buildBeam();updateImpact();animate();
console.log('✅ 示波管3D模型 — 电子枪(左) → 偏转板 → 荧光屏(右)');
</script>
</body>
</html>
