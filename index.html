<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高中物理教学演示平台（浙工大附属德高物理组）</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <!-- 顶部标题栏 -->
  <header class="header">
    <div class="header-inner">
      <div class="header-top">
        <div>
          <h1 class="site-title">
            <span class="title-icon">📐</span>
            高中物理教学演示平台（浙工大附属德高物理组）
          </h1>
          <p class="site-subtitle">交互式物理模拟 · 课堂演示专用</p>
        </div>
        <button class="btn-upload" id="btnOpenUpload" title="上传新的教学程序">
          <span class="btn-upload-icon">📤</span>
          上传程序
        </button>
      </div>
    </div>
  </header>

  <!-- 分类导航标签 -->
  <nav class="nav-bar" id="navBar">
    <!-- 由JS动态渲染 -->
  </nav>

  <!-- 主内容区 -->
  <main class="main-content">
    <div class="category-header" id="categoryHeader">
      <h2 class="category-title" id="categoryTitle">全部程序</h2>
      <p class="category-desc" id="categoryDesc"></p>
      <span class="program-count" id="programCount"></span>
    </div>

    <div class="card-grid" id="cardGrid"></div>

    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">📭</div>
      <h3>暂无教学程序</h3>
      <p>点击右上角「📤 上传程序」按钮上传你的第一个HTML教学程序</p>
    </div>
  </main>

  <!-- 底部信息 -->
  <footer class="footer">
    <p>高中物理教学演示平台（浙工大附属德高物理组）· Powered by Netlify</p>
    <p class="footer-updated">最后更新：<span id="updateTime">加载中...</span></p>
  </footer>

  <!-- ======================================== -->
  <!-- 删除确认弹窗                                -->
  <!-- ======================================== -->
  <div class="modal-overlay" id="deleteModal" style="display:none;">
    <div class="modal-panel modal-panel-sm">
      <div class="modal-header">
        <h2>⚠️ 确认删除</h2>
        <button class="modal-close" id="btnCloseDelete">&times;</button>
      </div>
      <div class="modal-body">
        <p class="delete-warning">
          确定要删除程序 <strong id="deleteFileName"></strong> 吗？
        </p>
        <p class="delete-hint">此操作不可撤销，删除后约1-2分钟生效。</p>

        <div id="deletePasswordField" style="display:none;">
          <label class="form-label">管理员密码</label>
          <input type="password" class="form-input" id="deletePassword"
                 placeholder="请输入管理员密码" autocomplete="off">
        </div>

        <div class="delete-actions">
          <button class="btn-cancel" id="btnCancelDelete">取消</button>
          <button class="btn-danger" id="btnConfirmDelete">确认删除</button>
        </div>

        <div class="upload-status" id="deleteStatus" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- ======================================== -->
  <!-- 上传弹窗                                  -->
  <!-- ======================================== -->
  <div class="modal-overlay" id="uploadModal" style="display:none;">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>📤 上传教学程序</h2>
        <button class="modal-close" id="btnCloseUpload">&times;</button>
      </div>

      <div class="modal-body">
        <!-- 分类选择 -->
        <label class="form-label">选择分类</label>
        <select class="form-select" id="uploadCategory">
          <option value="1-li">🍎 力 — 力学</option>
          <option value="2-re">🔥 热 — 热学</option>
          <option value="3-dianlu">⚡ 电路</option>
          <option value="4-dianci">🧲 电磁感应</option>
          <option value="5-lizi">⚛️ 带电粒子在磁场中运动</option>
          <option value="6-guang">💡 光 — 光学</option>
          <option value="7-yuan">🔬 原 — 原子物理</option>
        </select>

        <!-- 文件选择 -->
        <label class="form-label">选择 HTML 文件</label>
        <div class="file-drop-zone" id="fileDropZone">
          <input type="file" id="uploadFile" accept=".html,.htm" class="file-input-hidden">
          <div class="file-drop-content">
            <span class="file-drop-icon">📁</span>
            <span id="fileDropText">点击选择文件，或拖拽 .html 文件到此处</span>
            <span class="file-drop-hint">最大 5MB</span>
          </div>
        </div>

        <!-- 文件名预览 -->
        <div class="file-preview" id="filePreview" style="display:none;">
          <span class="file-preview-icon">📄</span>
          <span class="file-preview-name" id="filePreviewName"></span>
          <span class="file-preview-size" id="filePreviewSize"></span>
        </div>

        <!-- 上传状态提示 -->
        <div class="upload-status" id="uploadStatus" style="display:none;"></div>

        <!-- 提交按钮 -->
        <button class="btn-submit" id="btnSubmitUpload" disabled>
          <span id="btnSubmitText">上传到服务器</span>
          <span class="spinner" id="uploadSpinner" style="display:none;"></span>
        </button>

        <p class="upload-note">
          上传后文件将自动提交到 GitHub，约 1-2 分钟后在首页可见。
        </p>
      </div>
    </div>
  </div>

  <!-- ======================================== -->
  <!-- JavaScript                              -->
  <!-- ======================================== -->
  <script>
    (function() {
      // ============ Catalog 状态 ============
      let catalog = null;

      // ============ 加载目录 ============
      async function loadCatalog() {
        try {
          const resp = await fetch('catalog.json');
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          catalog = await resp.json();
          renderNav();
          showCategory('all');
          document.getElementById('updateTime').textContent =
            new Date(catalog.updatedAt).toLocaleString('zh-CN');
        } catch (err) {
          console.error('加载目录失败:', err);
          document.getElementById('cardGrid').innerHTML =
            '<div class="load-error">⚠️ 加载程序目录失败，请运行 <code>node build.js</code> 生成目录文件</div>';
        }
      }

      // ============ 渲染导航栏 ============
      function renderNav() {
        const nav = document.getElementById('navBar');
        if (!catalog) return;

        let html = '<button class="nav-tab active" data-cat="all">📋 全部<span class="tab-badge">' +
          catalog.totalPrograms + '</span></button>';

        catalog.categories.forEach(cat => {
          html += '<button class="nav-tab" data-cat="' + cat.id + '" style="--cat-color:' + cat.color + '">' +
            cat.emoji + ' ' + cat.name +
            '<span class="tab-badge">' + cat.programs.length + '</span>' +
            '</button>';
        });

        nav.innerHTML = html;

        nav.querySelectorAll('.nav-tab').forEach(tab => {
          tab.addEventListener('click', function() {
            nav.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            showCategory(this.dataset.cat);
          });
        });
      }

      // ============ 显示分类 ============
      function showCategory(catId) {
        if (!catalog) return;

        const title = document.getElementById('categoryTitle');
        const desc = document.getElementById('categoryDesc');
        const count = document.getElementById('programCount');
        const grid = document.getElementById('cardGrid');
        const empty = document.getElementById('emptyState');

        let programs = [];

        if (catId === 'all') {
          title.textContent = '全部教学程序';
          desc.textContent = '浏览所有物理板块的交互式演示程序';
          catalog.categories.forEach(cat => {
            cat.programs.forEach(p => programs.push({ ...p, category: cat }));
          });
        } else {
          const cat = catalog.categories.find(c => c.id === catId);
          if (cat) {
            title.textContent = cat.emoji + ' ' + cat.fullName;
            desc.textContent = cat.description;
            programs = cat.programs.map(p => ({ ...p, category: cat }));
          }
        }

        count.textContent = '共 ' + programs.length + ' 个程序';

        if (programs.length === 0) {
          grid.style.display = 'none';
          empty.style.display = 'block';
        } else {
          grid.style.display = 'grid';
          empty.style.display = 'none';
          grid.innerHTML = programs.map(p => renderCard(p)).join('');
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function renderCard(program) {
        const cat = program.category;
        const data = escapeHtml(JSON.stringify({ category: cat.id, filename: program.file }));
        return `
          <div class="card" style="--card-accent: ${cat.color}" data-program='${data}'>
            <div class="card-accent"></div>
            <a class="card-body card-link" href="${program.path}" target="_blank" rel="noopener">
              <span class="card-cat-badge" style="background:${cat.color}15;color:${cat.color}">
                ${cat.emoji} ${cat.name}
              </span>
              <h3 class="card-title">${escapeHtml(program.title)}</h3>
              <div class="card-footer">
                <span class="card-file">📄 ${escapeHtml(program.file)}</span>
                <span class="card-arrow">打开 →</span>
              </div>
            </a>
            <button class="btn-delete" title="删除此程序" data-action="delete">🗑</button>
            <button class="btn-download" title="下载此程序" data-action="download">💾</button>
          </div>
        `;
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // ========================================
      // 上传功能
      // ========================================
      const modal = document.getElementById('uploadModal');
      const fileInput = document.getElementById('uploadFile');
      const dropZone = document.getElementById('fileDropZone');
      const filePreview = document.getElementById('filePreview');
      const filePreviewName = document.getElementById('filePreviewName');
      const filePreviewSize = document.getElementById('filePreviewSize');
      const fileDropText = document.getElementById('fileDropText');
      const btnSubmit = document.getElementById('btnSubmitUpload');
      const btnSubmitText = document.getElementById('btnSubmitText');
      const uploadSpinner = document.getElementById('uploadSpinner');
      const uploadStatus = document.getElementById('uploadStatus');
      let selectedFile = null;

      // 打开弹窗
      document.getElementById('btnOpenUpload').addEventListener('click', () => {
        resetUploadForm();
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      });

      // 关闭弹窗
      document.getElementById('btnCloseUpload').addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
      });

      function closeModal() {
        modal.style.display = 'none';
        document.body.style.overflow = '';
        resetUploadForm();
      }

      function resetUploadForm() {
        fileInput.value = '';
        selectedFile = null;
        filePreview.style.display = 'none';
        fileDropText.textContent = '点击选择文件，或拖拽 .html 文件到此处';
        fileDropText.className = '';
        btnSubmit.disabled = true;
        uploadStatus.style.display = 'none';
        uploadStatus.className = 'upload-status';
        uploadStatus.textContent = '';
        btnSubmitText.textContent = '上传到服务器';
        uploadSpinner.style.display = 'none';
        // upload no longer needs password
      }

      // 文件选择：click
      dropZone.addEventListener('click', () => fileInput.click());

      // 文件选择：change
      fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
          handleFile(fileInput.files[0]);
        }
      });

      // 拖拽
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
          handleFile(e.dataTransfer.files[0]);
        }
      });

      function handleFile(file) {
        if (!file.name.match(/\.html?$/i)) {
          alert('请选择 .html 或 .htm 文件');
          return;
        }
        if (file.size > 5 * 1024 * 1024) {
          alert('文件不能超过 5MB');
          return;
        }
        selectedFile = file;
        filePreview.style.display = 'flex';
        filePreviewName.textContent = file.name;
        filePreviewSize.textContent = formatSize(file.size);
        fileDropText.textContent = '✅ 已选择文件';
        fileDropText.className = 'text-success';
        btnSubmit.disabled = false;
        uploadStatus.style.display = 'none';
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      }

      // 提交上传
      btnSubmit.addEventListener('click', async () => {
        if (!selectedFile) return;

        const category = document.getElementById('uploadCategory').value;

        // 显示加载状态
        btnSubmit.disabled = true;
        btnSubmitText.textContent = '正在上传...';
        uploadSpinner.style.display = 'inline-block';
        uploadStatus.style.display = 'block';
        uploadStatus.className = 'upload-status status-info';
        uploadStatus.textContent = '⏳ 正在上传文件到服务器...';

        try {
          // 读取文件为 base64
          const base64 = await readFileAsBase64(selectedFile);

          // 发送请求
          uploadStatus.textContent = '⏳ 正在提交到 GitHub...';

          const body = {
            category: category,
            filename: selectedFile.name,
            content: base64
          };

          const resp = await fetch('/.netlify/functions/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });

          const data = await resp.json();

          if (data.ok) {
            uploadStatus.className = 'upload-status status-success';
            uploadStatus.innerHTML = '✅ ' + escapeHtml(data.message) +
              '<br><small>' + escapeHtml(data.detail || '') + '</small>';
            btnSubmitText.textContent = '上传成功！';
            uploadSpinner.style.display = 'none';

            // 3秒后自动关闭
            setTimeout(() => {
              closeModal();
              // 提示用户刷新
              showToast('文件已提交，约1-2分钟后刷新页面即可看到新程序 ✨');
            }, 3000);

          } else {
            uploadStatus.className = 'upload-status status-error';
            uploadStatus.textContent = '❌ ' + (data.error || '上传失败');
            btnSubmitText.textContent = '上传失败，重试';
            uploadSpinner.style.display = 'none';
            btnSubmit.disabled = false;
          }
        } catch (err) {
          uploadStatus.className = 'upload-status status-error';
          uploadStatus.textContent = '❌ 网络错误：' + (err.message || '请检查网络连接');
          btnSubmitText.textContent = '上传失败，重试';
          uploadSpinner.style.display = 'none';
          btnSubmit.disabled = false;
        }
      });

      function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            // 去掉 "data:...;base64," 前缀
            const base64 = reader.result.split(',')[1];
            resolve(base64);
          };
          reader.onerror = () => reject(new Error('文件读取失败'));
          reader.readAsDataURL(file);
        });
      }

      // Toast 提示
      function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.remove(), 300);
        }, 4000);
      }

      // ========================================
      // 删除功能
      // ========================================
      const deleteModal = document.getElementById('deleteModal');
      const deleteFileName = document.getElementById('deleteFileName');
      const deletePasswordField = document.getElementById('deletePasswordField');
      const deleteStatus = document.getElementById('deleteStatus');
      let deleteTarget = null;

      // 委托模式：监听所有卡片上的按钮点击
      document.getElementById('cardGrid').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        e.preventDefault();
        e.stopPropagation();

        if (btn.dataset.action === 'delete') {
          const card = btn.closest('.card');
          if (!card) return;
          try { deleteTarget = JSON.parse(card.dataset.program); } catch { return; }
          deleteFileName.textContent = deleteTarget.filename;
          deleteStatus.style.display = 'none';
          deleteStatus.className = 'upload-status';
          deletePasswordField.style.display = 'none';
          document.getElementById('deletePassword').value = '';
          document.getElementById('btnConfirmDelete').disabled = false;
          deleteModal.style.display = 'flex';
          document.body.style.overflow = 'hidden';
          checkDeletePasswordRequired();
        }

        if (btn.dataset.action === 'download') {
          const card = btn.closest('.card');
          if (!card) return;
          try { downloadTarget = JSON.parse(card.dataset.program); } catch { return; }
          downloadFile();
        }
      });

      async function checkDeletePasswordRequired() {
        try {
          const resp = await fetch('/.netlify/functions/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ category: '1-li', filename: '_check_.html' })
          });
          if (resp.status === 403) {
            deletePasswordField.style.display = 'block';
          }
        } catch {}
      }

      document.getElementById('btnCloseDelete').addEventListener('click', closeDeleteModal);
      document.getElementById('btnCancelDelete').addEventListener('click', closeDeleteModal);
      deleteModal.addEventListener('click', (e) => {
        if (e.target === deleteModal) closeDeleteModal();
      });

      function closeDeleteModal() {
        deleteModal.style.display = 'none';
        document.body.style.overflow = '';
        deleteTarget = null;
        deleteStatus.style.display = 'none';
      }

      document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
        if (!deleteTarget) return;
        const btn = document.getElementById('btnConfirmDelete');
        btn.disabled = true;
        btn.textContent = '删除中...';
        deleteStatus.style.display = 'block';
        deleteStatus.className = 'upload-status status-info';
        deleteStatus.textContent = '⏳ 正在删除...';

        try {
          const body = {
            category: deleteTarget.category,
            filename: deleteTarget.filename
          };
          const pw = document.getElementById('deletePassword').value;
          if (pw) body.password = pw;

          const resp = await fetch('/.netlify/functions/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const data = await resp.json();

          if (data.ok) {
            deleteStatus.className = 'upload-status status-success';
            deleteStatus.innerHTML = '✅ ' + escapeHtml(data.message) + '<br><small>' + escapeHtml(data.detail || '') + '</small>';
            setTimeout(() => {
              closeDeleteModal();
              showToast('程序已删除，约1-2分钟后刷新页面即可生效');
            }, 2000);
          } else {
            deleteStatus.className = 'upload-status status-error';
            deleteStatus.textContent = '❌ ' + (data.error || '删除失败');
            btn.disabled = false;
            btn.textContent = '确认删除';
          }
        } catch (err) {
          deleteStatus.className = 'upload-status status-error';
          deleteStatus.textContent = '❌ 网络错误';
          btn.disabled = false;
          btn.textContent = '确认删除';
        }
      });

      // ========================================
      // 下载功能
      // ========================================
      let downloadTarget = null;

      async function downloadFile() {
        if (!downloadTarget) return;
        const path = downloadTarget.category + '/' + downloadTarget.filename;

        // 检查是否需要下载密码
        let needPwd = false;
        try {
          const check = await fetch('/.netlify/functions/check-download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
          });
          needPwd = (check.status === 403);
        } catch {}

        if (needPwd) {
          const pw = prompt('请输入下载密码：' + downloadTarget.filename);
          if (!pw) return;
          const verify = await fetch('/.netlify/functions/check-download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw })
          });
          if (verify.status === 403) {
            alert('下载密码错误！');
            return;
          }
        }

        // 触发下载
        try {
          const resp = await fetch(path);
          if (!resp.ok) throw new Error('文件获取失败');
          const blob = await resp.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = downloadTarget.filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast('✅ 下载完成：' + downloadTarget.filename);
        } catch (err) {
          alert('下载失败：' + err.message);
        }
      }

            // ESC 关闭弹窗
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (modal.style.display === 'flex') closeModal();
          if (deleteModal.style.display === 'flex') closeDeleteModal();
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') {
          closeModal();
        }
      });

      // ============ 启动 ============
      loadCatalog();
    })();
  </script>
</body>
</html>
