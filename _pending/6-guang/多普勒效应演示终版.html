<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>多普勒效应演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: #f3f6fb;
            color: #1e293b;
            line-height: 1.5;
            padding: 16px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 18px;
            padding: 18px 24px;
            background: #0f3b5f;
            color: white;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(15, 59, 95, 0.16);
        }
        h1 {
            font-size: 1.85rem;
            margin-bottom: 4px;
            letter-spacing: 0;
        }
        header p {
            font-size: 0.92rem;
            opacity: 0.9;
        }
        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 18px;
            align-items: flex-start;
        }
        .visualization-section {
            flex: 3.2;
            min-width: 320px;
            background: white;
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.08);
        }
        .control-section {
            flex: 1.1;
            min-width: 280px;
            background: white;
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.07);
        }
        h2 {
            font-size: 1.25rem;
            color: #0c4a6e;
            border-left: 4px solid #2c7da0;
            padding-left: 10px;
            margin-bottom: 14px;
        }
        .visualization-section h2 {
            font-size: 1.25rem;
        }
        .control-section h2 {
            font-size: 1.2rem;
            margin-bottom: 14px;
        }
        h3 {
            color: #155e75;
            font-size: 0.95rem;
            margin: 0 0 10px 0;
        }
        .visualization-container {
            position: relative;
            height: 620px;
            background-color: #0a0f1f;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
            border: 2px solid #2c7da0;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 8px 18px rgba(0, 0, 0, 0.2);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .control-group {
            background-color: #f8fafc;
            padding: 13px 14px;
            border-radius: 8px;
            border: 1px solid #d7e2ec;
        }
        .slider-container {
            margin: 12px 0 8px;
        }
        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 4px;
            background: #cbd5e1;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #1e4a76;
            cursor: pointer;
            border: 2px solid white;
        }
        .value-display {
            font-weight: 700;
            color: #0f3b5c;
            background: #e6edf4;
            padding: 0 8px;
            border-radius: 999px;
            font-size: 0.8rem;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        button {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            background: #1e4a76;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex: 1;
        }
        button:hover {
            background: #0f3b5f;
            transform: translateY(-1px);
        }
        .btn-start {
            background: #2c7a47;
        }
        .btn-start:hover {
            background: #1e5a36;
        }
        .btn-pause {
            background: #b4534b;
        }
        .btn-pause:hover {
            background: #9b3f38;
        }
        .btn-reset {
            background: #4a5b6e;
        }
        .info-display {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }
        .info-card {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 8px 6px;
            text-align: center;
            border-top: 3px solid #2c7da0;
        }
        .info-card h4 {
            color: #0c4a6e;
            margin-bottom: 5px;
            font-size: 0.7rem;
        }
        .info-card p {
            font-size: 1rem;
            font-weight: bold;
        }
        .explanation {
            background: #eef4ff;
            padding: 12px 14px;
            border-radius: 8px;
            margin-top: 12px;
            border-left: 4px solid #1e4a76;
            font-size: 0.82rem;
        }
        .formula-box {
            background-color: #0b2b3f;
            color: #eef4ff;
            padding: 9px 10px;
            border-radius: 8px;
            text-align: center;
            margin-top: 10px;
            font-size: 0.86rem;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.75rem;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }
        .source-color { background-color: #ff5e6b; }
        .observer-color { background-color: #42c5f0; }
        .wave-color { background-color: #111827; }
        .source-number-color { background-color: #fff4fb; border: 2px solid #f2a1c0; }
        .receive-number-color { background-color: #eef8ff; border: 2px solid #82c6ff; }
        @media (max-width: 880px) {
            .visualization-container { height: 480px; }
        }
        @media (max-width: 680px) {
            .visualization-container { height: 400px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>多普勒效应</h1>
        <p>波源与观察者相对运动时，接收频率会发生变化。</p>
    </header>

    <div class="main-content">
        <section class="visualization-section">
            <h2>波前示意</h2>
            <div class="visualization-container">
                <canvas id="waveCanvas" width="900" height="620"></canvas>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-color source-color"></div><span>波源</span></div>
                <div class="legend-item"><div class="legend-color observer-color"></div><span>观察者</span></div>
                <div class="legend-item"><div class="legend-color wave-color"></div><span>波前</span></div>
                <div class="legend-item"><div class="legend-color source-number-color"></div><span>源端编号</span></div>
                <div class="legend-item"><div class="legend-color receive-number-color"></div><span>接收编号</span></div>
            </div>
            <div class="explanation">
                <h3>编号规则</h3>
                <p>观察者接收到第一个波后开始计数。红色编号表示源端发出的波，蓝色编号表示观察者接收到的波。</p>
                <div class="formula-box">
                    接近时：f' = f × (v + v<sub>o</sub>) / (v - v<sub>s</sub>)
                </div>
            </div>
        </section>

        <section class="control-section">
            <h2>参数</h2>
            <div class="controls">
                <div class="control-group">
                    <h3>速度</h3>
                    <div class="slider-container">
                        <label><span>波源速度 (m/s)</span><span class="value-display" id="sourceSpeedValue">0</span></label>
                        <input type="range" id="sourceSpeed" min="-30" max="30" value="0" step="1">
                        <div style="display: flex; justify-content: space-between; font-size: 0.7rem;"><span>← 远离</span><span>接近 →</span></div>
                    </div>
                    <div class="slider-container">
                        <label><span>观察者速度 (m/s)</span><span class="value-display" id="observerSpeedValue">0</span></label>
                        <input type="range" id="observerSpeed" min="-20" max="20" value="0" step="1">
                        <div style="display: flex; justify-content: space-between; font-size: 0.7rem;"><span>← 远离波源</span><span>接近波源 →</span></div>
                    </div>
                </div>

                <div class="control-group">
                    <h3>波</h3>
                    <div class="slider-container">
                        <label><span>波源频率 (Hz)</span><span class="value-display" id="frequencyValue">2.0</span></label>
                        <input type="range" id="frequency" min="1" max="5" value="2.0" step="0.2">
                    </div>
                    <div class="slider-container">
                        <label><span>波速 (m/s)</span><span class="value-display" id="waveSpeedValue">100</span></label>
                        <input type="range" id="waveSpeed" min="50" max="200" value="100" step="10">
                    </div>
                </div>

                <div class="button-group">
                    <button id="startBtn" class="btn-start">开始</button>
                    <button id="pauseBtn" class="btn-pause">暂停</button>
                    <button id="resetBtn" class="btn-reset">重置</button>
                </div>

                <div class="info-display">
                    <div class="info-card"><h4>源频率</h4><p id="sourceFreqDisplay">2.0 Hz</p></div>
                    <div class="info-card"><h4>观察频率</h4><p id="observedFreqDisplay">2.0 Hz</p></div>
                    <div class="info-card"><h4>源波长</h4><p id="sourceWavelength">50.0 m</p></div>
                    <div class="info-card"><h4>观察波长</h4><p id="observedWavelength">50.0 m</p></div>
                </div>
                <div class="info-card" style="background:#ffe8c7;">
                    <h4>接收编号</h4>
                    <p id="receivedCountDisplay" style="font-size:1.3rem;">—</p>
                    <div style="font-size:0.7rem; margin-top: 4px;">接收个数: <span id="receivedTotalSpan">0</span></div>
                    <div style="font-size:0.7rem;">源端状态: <span id="sourceShowStatus">等待首次接收</span></div>
                </div>

                <div class="explanation" style="margin-top: 8px;">
                    <h3>提示</h3>
                    <p id="analysisText">点击开始，观察波前间距和接收频率的变化。</p>
                </div>
            </div>
        </section>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');

        const defaults = {
            sourceSpeed: 0,
            observerSpeed: 0,
            frequency: 2.0,   // 初始频率改为 2 Hz
            waveSpeed: 100    // 初始波速改为 100 m/s
        };
        const pxPerMeter = 0.92;
        const motionPxPerMeter = 2.7;

        let params = {
            ...defaults,
            elapsed: 0,
            emitClock: 0,
            animationId: null,
            isAnimating: false,
            numberingActive: false,
            nextSourceNumber: 1,
            nextObserverNumber: 1,
            emittedNumberCount: 0,
            lastTimestamp: null
        };

        const waveSource = { x: 0, y: 0, radius: 9, color: '#ff5e7a', waves: [] };
        const observer = { x: 0, y: 0, radius: 8, color: '#42c5f0' };
        let receivedNumbers = [];

        class TrackedWave {
            constructor(sourceNumber, x, y, speed) {
                this.sourceNumber = sourceNumber;
                this.receiveNumber = null;
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.speed = speed;
                this.received = false;
                this.createdAt = params.elapsed;
            }
        }

        const sourceSpeedSlider = document.getElementById('sourceSpeed');
        const observerSpeedSlider = document.getElementById('observerSpeed');
        const frequencySlider = document.getElementById('frequency');
        const waveSpeedSlider = document.getElementById('waveSpeed');
        const sourceSpeedValue = document.getElementById('sourceSpeedValue');
        const observerSpeedValue = document.getElementById('observerSpeedValue');
        const frequencyValue = document.getElementById('frequencyValue');
        const waveSpeedValue = document.getElementById('waveSpeedValue');
        const sourceFreqDisplay = document.getElementById('sourceFreqDisplay');
        const observedFreqDisplay = document.getElementById('observedFreqDisplay');
        const sourceWavelengthSpan = document.getElementById('sourceWavelength');
        const observedWavelengthSpan = document.getElementById('observedWavelength');
        const analysisText = document.getElementById('analysisText');
        const receivedCountDisplay = document.getElementById('receivedCountDisplay');
        const receivedTotalSpan = document.getElementById('receivedTotalSpan');
        const sourceShowStatus = document.getElementById('sourceShowStatus');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');

        function getObservedFrequency() {
            const f = params.frequency;
            const v = params.waveSpeed;
            const vs = params.sourceSpeed;
            const vo = params.observerSpeed;
            return Math.max(0.1, f * (v + vo) / Math.max(0.01, v - vs));
        }

        function calcWavelength(freq) {
            return freq <= 0 ? 999 : params.waveSpeed / freq;
        }

        function updateDisplayAndAnalysis() {
            const srcFreq = params.frequency;
            const obsFreq = getObservedFrequency();
            sourceFreqDisplay.textContent = srcFreq.toFixed(1) + " Hz";
            observedFreqDisplay.textContent = obsFreq.toFixed(1) + " Hz";
            sourceWavelengthSpan.textContent = calcWavelength(srcFreq).toFixed(1) + " m";
            observedWavelengthSpan.textContent = calcWavelength(obsFreq).toFixed(1) + " m";

            const lastReceived = receivedNumbers.length > 0 ? receivedNumbers[receivedNumbers.length - 1] : 0;
            receivedCountDisplay.textContent = lastReceived > 0 ? `#${lastReceived}` : "—";
            receivedTotalSpan.textContent = receivedNumbers.length;
            sourceShowStatus.textContent = params.numberingActive
                ? `源端已发 #${params.emittedNumberCount || 0}，下一个 #${params.nextSourceNumber}`
                : "等待观察者接收第1个波...";

            if (params.numberingActive) {
                analysisText.textContent = `计数已启动：源端发出编号和观察者接收编号分开显示，均从 #1 开始。`;
            } else if (params.sourceSpeed === 0 && params.observerSpeed === 0) {
                analysisText.textContent = `静止状态：波前等间距，观察者接收频率 = 源频率。`;
            } else {
                analysisText.textContent = `相对运动使源频率 ${srcFreq.toFixed(1)} Hz 变为观察频率 ${obsFreq.toFixed(1)} Hz；接收到第一个波时启动两套编号。`;
            }
        }

        function generateWaveRing() {
            let sourceNumber = null;
            if (params.numberingActive) {
                sourceNumber = params.nextSourceNumber;
                params.nextSourceNumber++;
                params.emittedNumberCount = sourceNumber;
            }
            waveSource.waves.push(new TrackedWave(sourceNumber, waveSource.x, waveSource.y, params.waveSpeed));
            if (waveSource.waves.length > 42) {
                waveSource.waves = waveSource.waves.slice(-42);
            }
            updateDisplayAndAnalysis();
        }

        function checkWaveReception() {
            for (const wave of waveSource.waves) {
                if (wave.received) continue;
                const distToObserver = Math.hypot(observer.x - wave.x, observer.y - wave.y);
                if (wave.radius < distToObserver) continue;

                wave.received = true;
                if (!params.numberingActive) {
                    params.numberingActive = true;
                    const firstSourceWave = [...waveSource.waves]
                        .reverse()
                        .find(w => w !== wave && w.sourceNumber === null && !w.received);
                    if (firstSourceWave) {
                        firstSourceWave.sourceNumber = params.nextSourceNumber;
                    }
                    params.emittedNumberCount = params.nextSourceNumber;
                    params.nextSourceNumber++;
                }
                wave.receiveNumber = params.nextObserverNumber;
                receivedNumbers.push(params.nextObserverNumber);
                params.nextObserverNumber++;
                updateDisplayAndAnalysis();
            }
        }

        function updateSimulation(dt) {
            params.elapsed += dt;
            params.emitClock += dt;
            const interval = 1 / params.frequency;
            while (params.emitClock >= interval) {
                generateWaveRing();
                params.emitClock -= interval;
            }

            waveSource.x += params.sourceSpeed * motionPxPerMeter * dt;
            observer.x -= params.observerSpeed * motionPxPerMeter * dt;
            const margin = 48;
            waveSource.x = Math.min(Math.max(waveSource.x, margin), canvas.width - margin);
            observer.x = Math.min(Math.max(observer.x, margin), canvas.width - margin);
            waveSource.y = canvas.height * 0.52;
            observer.y = canvas.height * 0.52;

            for (const wave of waveSource.waves) {
                wave.radius += wave.speed * pxPerMeter * dt;
            }
            waveSource.waves = waveSource.waves.filter(wave => wave.radius < Math.max(canvas.width, canvas.height) * 1.35);
            checkWaveReception();
        }

        function drawGrid() {
            const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            bg.addColorStop(0, '#071428');
            bg.addColorStop(0.55, '#0b1f3a');
            bg.addColorStop(1, '#0d2a48');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const step = 45;
            ctx.strokeStyle = 'rgba(148, 197, 255, 0.13)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += step) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += step) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            ctx.strokeStyle = 'rgba(210, 230, 255, 0.28)';
            ctx.setLineDash([4, 7]);
            ctx.beginPath();
            ctx.moveTo(0, waveSource.y);
            ctx.lineTo(canvas.width, waveSource.y);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawNumberBubble(x, y, value, stroke, fill, textColor) {
            if (x < -20 || x > canvas.width + 20 || y < -20 || y > canvas.height + 20) return;
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            ctx.fillStyle = fill;
            ctx.fill();
            ctx.strokeStyle = stroke;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = textColor;
            ctx.font = 'bold 14px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(value, x, y + 0.5);
            ctx.textAlign = 'start';
            ctx.textBaseline = 'alphabetic';
        }

        function drawWavesAndNumbers() {
            for (const wave of waveSource.waves) {
                const fade = Math.max(0.18, 1 - wave.radius / (canvas.width * 1.08));
                ctx.beginPath();
                ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(123, 196, 255, ${0.86 * fade})`;
                ctx.lineWidth = 2.2;
                ctx.stroke();
            }

            const numberedWaves = waveSource.waves
                .filter(wave => wave.sourceNumber !== null)
                .slice(-12);
            for (const wave of numberedWaves) {
                const labelX = wave.x + wave.radius;
                drawNumberBubble(labelX, wave.y - 14, wave.sourceNumber, '#f2a1c0', '#fff4fb', '#9f2d67');
            }

            const receivedWaves = waveSource.waves
                .filter(wave => wave.receiveNumber !== null)
                .slice(-12);
            for (const wave of receivedWaves) {
                const labelX = wave.x + wave.radius;
                drawNumberBubble(labelX, observer.y + 16, wave.receiveNumber, '#82c6ff', '#eef8ff', '#2467b5');
            }

            ctx.strokeStyle = 'rgba(255, 123, 174, 0.55)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(waveSource.x + 14, waveSource.y);
            ctx.lineTo(observer.x - 12, observer.y);
            ctx.stroke();
        }

        function drawReceivedBadges() {
            if (receivedNumbers.length === 0) return;
            ctx.fillStyle = '#bfeaff';
            ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
            ctx.fillText(`接收计数:${receivedNumbers.length}`, observer.x + 20, observer.y + 58);
        }

        function drawSource() {
            ctx.beginPath();
            ctx.arc(waveSource.x, waveSource.y, waveSource.radius, 0, Math.PI * 2);
            ctx.fillStyle = waveSource.color;
            ctx.fill();
            ctx.strokeStyle = '#8b1e3f';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.fillStyle = '#ffd6e4';
            ctx.font = 'bold 15px "Microsoft YaHei", sans-serif';
            ctx.fillText('波源', waveSource.x - 16, waveSource.y + 28);
            if (params.sourceSpeed !== 0 && params.isAnimating) {
                drawArrow(waveSource.x, waveSource.y - waveSource.radius - 8,
                    waveSource.x + Math.sign(params.sourceSpeed) * 44, waveSource.y - waveSource.radius - 8, '#ffa270');
            }
        }

        function drawObserver() {
            ctx.beginPath();
            ctx.arc(observer.x, observer.y, observer.radius, 0, Math.PI * 2);
            ctx.fillStyle = observer.color;
            ctx.fill();
            ctx.strokeStyle = '#0a3d91';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            ctx.fillStyle = '#caf2ff';
            ctx.font = 'bold 15px "Microsoft YaHei", sans-serif';
            ctx.fillText('观察者', observer.x - 22, observer.y + 42);
            if (params.observerSpeed !== 0 && params.isAnimating) {
                drawArrow(observer.x, observer.y + observer.radius + 10,
                    observer.x - Math.sign(params.observerSpeed) * 44, observer.y + observer.radius + 10, '#7bcfff');
            }
        }

        function drawArrow(fromX, fromY, toX, toY, color) {
            const angle = Math.atan2(toY - fromY, toX - fromX);
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 2.4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - 9 * Math.cos(angle - Math.PI / 6), toY - 9 * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - 9 * Math.cos(angle + Math.PI / 6), toY - 9 * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fill();
            ctx.lineCap = 'butt';
        }

        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            drawWavesAndNumbers();
            drawReceivedBadges();
            drawSource();
            drawObserver();
        }

        function animateScene(timestamp) {
            if (params.lastTimestamp === null) {
                params.lastTimestamp = timestamp;
            }
            const dt = Math.min((timestamp - params.lastTimestamp) / 1000, 0.05);
            params.lastTimestamp = timestamp;

            if (params.isAnimating) {
                updateSimulation(dt);
            }
            drawScene();
            params.animationId = requestAnimationFrame(animateScene);
        }

        function placeActors() {
            waveSource.x = canvas.width * 0.28;
            waveSource.y = canvas.height * 0.52;
            observer.x = canvas.width * 0.72;
            observer.y = canvas.height * 0.52;
        }

        function syncControlValues() {
            sourceSpeedSlider.value = params.sourceSpeed;
            observerSpeedSlider.value = params.observerSpeed;
            frequencySlider.value = params.frequency;
            waveSpeedSlider.value = params.waveSpeed;
            sourceSpeedValue.textContent = params.sourceSpeed;
            observerSpeedValue.textContent = params.observerSpeed;
            frequencyValue.textContent = params.frequency.toFixed(1);
            waveSpeedValue.textContent = params.waveSpeed;
        }

        function fullReset() {
            params = {
                ...params,
                ...defaults,
                elapsed: 0,
                emitClock: 0,
                isAnimating: false,
                numberingActive: false,
                nextSourceNumber: 1,
                nextObserverNumber: 1,
                emittedNumberCount: 0,
                lastTimestamp: null
            };
            waveSource.waves = [];
            receivedNumbers = [];
            placeActors();
            syncControlValues();
            updateDisplayAndAnalysis();
            drawScene();
        }

        function startAnimation() {
            if (params.isAnimating) return;
            params.isAnimating = true;
            params.lastTimestamp = null;
            if (waveSource.waves.length === 0) {
                generateWaveRing();
            }
            updateDisplayAndAnalysis();
        }

        function pauseAnimation() {
            params.isAnimating = false;
        }

        function resizeCanvasAndPlace() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            placeActors();
            drawScene();
        }

        sourceSpeedSlider.addEventListener('input', (e) => {
            params.sourceSpeed = parseInt(e.target.value, 10);
            sourceSpeedValue.textContent = params.sourceSpeed;
            updateDisplayAndAnalysis();
        });
        observerSpeedSlider.addEventListener('input', (e) => {
            params.observerSpeed = parseInt(e.target.value, 10);
            observerSpeedValue.textContent = params.observerSpeed;
            updateDisplayAndAnalysis();
        });
        frequencySlider.addEventListener('input', (e) => {
            params.frequency = parseFloat(e.target.value);
            frequencyValue.textContent = params.frequency.toFixed(1);
            updateDisplayAndAnalysis();
        });
        waveSpeedSlider.addEventListener('input', (e) => {
            params.waveSpeed = parseInt(e.target.value, 10);
            waveSpeedValue.textContent = params.waveSpeed;
            updateDisplayAndAnalysis();
        });
        startBtn.addEventListener('click', startAnimation);
        pauseBtn.addEventListener('click', pauseAnimation);
        resetBtn.addEventListener('click', fullReset);
        window.addEventListener('resize', () => {
            resizeCanvasAndPlace();
            updateDisplayAndAnalysis();
        });

        resizeCanvasAndPlace();
        syncControlValues();
        updateDisplayAndAnalysis();
        params.animationId = requestAnimationFrame(animateScene);
    })();
</script>
</body>
</html>
